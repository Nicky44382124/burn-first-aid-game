<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烧烫伤急救大冒险 - 冲脱泡盖送</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        
        /* 开始界面 */
        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
            padding-top: 0;
            overflow-y: auto;
            transition: transform 0.5s, opacity 0.5s;
        }
        
        .start-screen.hidden {
            transform: translateY(-100%);
            pointer-events: none;
            opacity: 0;
        }
        
        /* 专业标题 - 参考海姆立克游戏风格 */
        .main-title {
            width: 100%;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            padding: 20px 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .main-title h1 {
            font-size: 1.6rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin: 0;
            letter-spacing: 1px;
        }
        
        .main-title .emoji {
            margin: 0 8px;
        }
        
        .game-title {
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 3px 3px 0 #2c3e50, 5px 5px 10px rgba(0,0,0,0.5);
            margin: 2rem 0 0.5rem;
            animation: bounce 0.5s ease infinite alternate;
        }
        
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #ffeaa7;
            margin-bottom: 1.5rem;
        }
        
        .start-btn {
            padding: 1rem 3rem;
            font-size: 1.5rem;
            background: #f1c40f;
            border: 4px solid #2c3e50;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 6px 0 #d4a017;
            transition: all 0.1s;
        }
        
        .start-btn:hover {
            background: #f39c12;
        }
        
        .start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #d4a017;
        }
        
        .instructions {
            margin: 1.5rem 2rem;
            color: #fff;
            text-align: center;
            line-height: 1.8;
            background: rgba(0,0,0,0.2);
            padding: 1.5rem;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.2);
            max-width: 400px;
        }
        
        /* 游戏区域 */
        .game-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem;
        }
        
        /* 游戏顶部横幅 - 统一风格 */
        .game-banner {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            padding: 10px 15px;
            text-align: center;
            border-radius: 10px 10px 0 0;
            border: 3px solid #2c3e50;
            border-bottom: none;
        }
        
        .game-banner-text {
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            margin: 0;
        }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1rem;
            background: linear-gradient(180deg, #3498db 0%, #2980b9 100%);
            border-radius: 0;
            border-left: 3px solid #2c3e50;
            border-right: 3px solid #2c3e50;
        }
        
        .lives {
            display: flex;
            gap: 0.5rem;
        }
        
        .heart {
            width: 30px;
            height: 30px;
            background: #e74c3c;
            clip-path: path('M15,26 C5,20 0,12 0,8 C0,3 4,0 8,0 C11,0 13,2 15,5 C17,2 19,0 22,0 C26,0 30,3 30,8 C30,12 25,20 15,26');
            transform: scale(1);
        }
        
        .heart.lost {
            background: #7f8c8d;
        }
        
        .score {
            font-size: 1.5rem;
            color: #fff;
            text-shadow: 2px 2px 0 #2c3e50;
        }
        
        .level-indicator {
            background: #2c3e50;
            color: #f1c40f;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            font-weight: bold;
        }
        
        #gameCanvas {
            border-left: 3px solid #2c3e50;
            border-right: 3px solid #2c3e50;
            border-bottom: 3px solid #2c3e50;
            border-radius: 0 0 10px 10px;
            display: block;
            width: 100%;
        }
        
        /* 关卡信息 */
        .level-info {
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
            padding: 1rem;
            margin-top: 1rem;
            border-radius: 10px;
            border: 3px solid #2c3e50;
            text-align: center;
        }
        
        .step-name {
            font-size: 2rem;
            color: #fff;
            text-shadow: 2px 2px 0 #2c3e50;
            margin-bottom: 0.5rem;
        }
        
        .step-desc {
            color: #ffeaa7;
            font-size: 1.1rem;
        }
        
        /* 控制说明 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        
        .control-key {
            background: #ecf0f1;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            border: 2px solid #bdc3c7;
            font-weight: bold;
            color: #2c3e50;
        }
        
        /* 音效控制 */
        .sound-toggle {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: 2px solid #fff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 2000;
        }
        
        /* 结束界面 */
        .end-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1001;
        }
        
        .end-screen.show {
            display: flex;
        }
        
        .end-title {
            font-size: 2.5rem;
            color: #f1c40f;
            margin-bottom: 1rem;
        }
        
        .end-score {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 1rem;
        }
        
        .retry-btn {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            background: #27ae60;
            color: #fff;
            border: 3px solid #2c3e50;
            border-radius: 10px;
            cursor: pointer;
        }
        
        /* 急救知识卡片 */
        .knowledge-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: #fff;
            padding: 2rem;
            border-radius: 15px;
            border: 4px solid #e74c3c;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1002;
            text-align: center;
            max-width: 90%;
            width: 450px;
            transition: transform 0.3s;
        }
        
        .knowledge-card.show {
            transform: translate(-50%, -50%) scale(1);
        }
        
        .card-title {
            font-size: 1.8rem;
            color: #e74c3c;
            margin-bottom: 1rem;
        }
        
        .card-content {
            font-size: 1.1rem;
            color: #2c3e50;
            line-height: 1.8;
        }
        
        .card-btn {
            margin-top: 1.5rem;
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .card-footer {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px dashed #ddd;
            font-size: 0.9rem;
            color: #e74c3c;
            font-weight: bold;
        }
        
        /* 移动端控制 */
        .mobile-controls {
            display: none;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .mobile-btn {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            background: #3498db;
            color: #fff;
            border: 3px solid #2c3e50;
            border-radius: 10px;
            cursor: pointer;
        }
        
        @media (max-width: 600px) {
            .mobile-controls {
                display: flex;
            }
            .game-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- 音效开关 -->
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>
    
    <!-- 开始界面 -->
    <div class="start-screen" id="startScreen">
        <!-- 专业标题 - 统一风格 -->
        <div class="main-title">
            <h1>
                <span class="emoji">🏥</span>
                汉川市向日葵社工中心 · 烧烫伤五步急救法
                <span class="emoji">🚑</span>
            </h1>
        </div>
        
        <!-- 游戏标题区域 -->
        <div style="text-align: center; padding: 1rem;">
            <h1 class="game-title">烧烫伤急救大冒险</h1>
            <p class="subtitle">🚿 学习"冲脱泡盖送"五步急救法 🚿</p>
        </div>
        
        <button class="start-btn" onclick="startGame()">开始游戏</button>
        
        <div class="instructions">
            <p><strong>游戏说明：</strong></p>
            <p>← → 移动 &nbsp; ↑ 跳跃</p>
            <p>完成五关，学习急救知识！</p>
            <p style="margin-top:1rem;color:#ffeaa7;">冲 → 脱 → 泡 → 盖 → 送</p>
        </div>
    </div>
    
    <!-- 游戏区域 -->
    <div class="game-container">
        <!-- 游戏顶部横幅 - 统一风格 -->
        <div class="game-banner">
            <p class="game-banner-text">
                🏥 汉川市向日葵社工中心 · 烧烫伤五步急救法 🚑
            </p>
        </div>
        
        <div class="game-header">
            <div class="lives" id="lives">
                <div class="heart"></div>
                <div class="heart"></div>
                <div class="heart"></div>
            </div>
            <div class="level-indicator" id="levelIndicator">关卡 1/5</div>
            <div class="score">得分: <span id="score">0</span></div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        
        <div class="level-info">
            <div class="step-name" id="stepName">第一步：冲</div>
            <div class="step-desc" id="stepDesc">收集所有物品完成闯关！</div>
        </div>
        
        <div class="controls">
            <span><span class="control-key">←</span> 向左</span>
            <span><span class="control-key">→</span> 向右</span>
            <span><span class="control-key">↑</span> 跳跃</span>
        </div>
        
        <div class="mobile-controls">
            <button class="mobile-btn" ontouchstart="mobileMove(-1)" ontouchend="mobileMoveEnd(-1)">◀</button>
            <button class="mobile-btn" ontouchstart="mobileJump()">▲</button>
            <button class="mobile-btn" ontouchstart="mobileMove(1)" ontouchend="mobileMoveEnd(1)">▶</button>
        </div>
    </div>
    
    <!-- 结束界面 -->
    <div class="end-screen" id="endScreen">
        <h2 class="end-title" id="endTitle">游戏结束</h2>
        <p class="end-score" id="endScore">🏥 汉川市向日葵社工中心 · 最终得分: 0</p>
        <button class="retry-btn" onclick="restartGame()">再玩一次</button>
    </div>
    
    <!-- 急救知识卡片 -->
    <div class="knowledge-card" id="knowledgeCard">
        <h3 class="card-title" id="cardTitle">急救知识</h3>
        <p class="card-content" id="cardContent"></p>
        <button class="card-btn" onclick="closeCard()">我学会了！</button>
        <div class="card-footer">🌻 汉川市向日葵社工中心</div>
    </div>

    <script>
        // ========== 音效系统 ==========
        class SoundManager {
            constructor() {
                this.audioContext = null;
                this.enabled = true;
                this.bgmGain = null;
                this.sfxGain = null;
            }
            
            init() {
                if (this.audioContext) return;
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // BGM 音量控制
                this.bgmGain = this.audioContext.createGain();
                this.bgmGain.gain.value = 0.3;
                this.bgmGain.connect(this.audioContext.destination);
                
                // 音效音量控制
                this.sfxGain = this.audioContext.createGain();
                this.sfxGain.gain.value = 0.5;
                this.sfxGain.connect(this.audioContext.destination);
            }
            
            // 超级玛丽金币声音
            playCoin() {
                if (!this.enabled || !this.audioContext) return;
                
                const ctx = this.audioContext;
                const now = ctx.currentTime;
                
                // 第一段高音
                const osc1 = ctx.createOscillator();
                const gain1 = ctx.createGain();
                osc1.type = 'square';
                osc1.frequency.setValueAtTime(988, now); // B5
                osc1.frequency.setValueAtTime(1319, now + 0.05); // E6
                gain1.gain.setValueAtTime(0.3, now);
                gain1.gain.exponentialDecayTo = 0.01;
                gain1.gain.setValueAtTime(0.3, now);
                gain1.gain.linearRampToValueAtTime(0, now + 0.15);
                osc1.connect(gain1);
                gain1.connect(this.sfxGain);
                osc1.start(now);
                osc1.stop(now + 0.15);
                
                // 第二段高音
                const osc2 = ctx.createOscillator();
                const gain2 = ctx.createGain();
                osc2.type = 'square';
                osc2.frequency.setValueAtTime(1319, now + 0.08);
                osc2.frequency.setValueAtTime(2637, now + 0.13);
                gain2.gain.setValueAtTime(0.3, now + 0.08);
                gain2.gain.linearRampToValueAtTime(0, now + 0.25);
                osc2.connect(gain2);
                gain2.connect(this.sfxGain);
                osc2.start(now + 0.08);
                osc2.stop(now + 0.25);
            }
            
            // 受伤声音
            playHurt() {
                if (!this.enabled || !this.audioContext) return;
                
                const ctx = this.audioContext;
                const now = ctx.currentTime;
                
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(80, now + 0.3);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.connect(gain);
                gain.connect(this.sfxGain);
                osc.start(now);
                osc.stop(now + 0.3);
            }
            
            // 跳跃声音
            playJump() {
                if (!this.enabled || !this.audioContext) return;
                
                const ctx = this.audioContext;
                const now = ctx.currentTime;
                
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.linearRampToValueAtTime(400, now + 0.1);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.15);
                osc.connect(gain);
                gain.connect(this.sfxGain);
                osc.start(now);
                osc.stop(now + 0.15);
            }
            
            // 关卡完成声音
            playLevelComplete() {
                if (!this.enabled || !this.audioContext) return;
                
                const ctx = this.audioContext;
                const now = ctx.currentTime;
                const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
                
                notes.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'square';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.25, now + i * 0.15);
                    gain.gain.linearRampToValueAtTime(0, now + i * 0.15 + 0.3);
                    osc.connect(gain);
                    gain.connect(this.sfxGain);
                    osc.start(now + i * 0.15);
                    osc.stop(now + i * 0.15 + 0.3);
                });
            }
            
            // 游戏结束声音
            playGameOver() {
                if (!this.enabled || !this.audioContext) return;
                
                const ctx = this.audioContext;
                const now = ctx.currentTime;
                const notes = [392, 330, 262, 196]; // G4, E4, C4, G3 下降
                
                notes.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'square';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.25, now + i * 0.2);
                    gain.gain.linearRampToValueAtTime(0, now + i * 0.2 + 0.4);
                    osc.connect(gain);
                    gain.connect(this.sfxGain);
                    osc.start(now + i * 0.2);
                    osc.stop(now + i * 0.2 + 0.4);
                });
            }
            
            // 超级玛丽主旋律 (简化版循环)
            startBGM() {
                if (!this.enabled || !this.audioContext) return;
                
                this.stopBGM();
                
                // 超级玛丽主旋律片段 (无限循环)
                const melody = [
                    { note: 659, duration: 0.15 },  // E5
                    { note: 659, duration: 0.15 },  // E5
                    { note: 0, duration: 0.15 },    // 休止
                    { note: 659, duration: 0.15 },  // E5
                    { note: 0, duration: 0.3 },     // 休止
                    { note: 523, duration: 0.15 },  // C5
                    { note: 659, duration: 0.3 },   // E5
                    { note: 784, duration: 0.3 },  // G5
                    { note: 0, duration: 0.3 },     // 休止
                ];
                
                // 地鼓节奏
                const bass = [
                    { note: 130, duration: 0.3 },   // C3
                    { note: 0, duration: 0.3 },
                    { note: 130, duration: 0.3 },
                    { note: 0, duration: 0.3 },
                    { note: 130, duration: 0.3 },
                    { note: 0, duration: 0.3 },
                    { note: 130, duration: 0.3 },
                    { note: 0, duration: 0.3 },
                ];
                
                const playSequence = (sequence, gain, startTime) => {
                    let time = startTime;
                    sequence.forEach(({ note, duration }) => {
                        if (note > 0) {
                            const osc = this.audioContext.createOscillator();
                            const envGain = this.audioContext.createGain();
                            osc.type = 'square';
                            osc.frequency.value = note;
                            envGain.gain.setValueAtTime(0.15, time);
                            envGain.gain.linearRampToValueAtTime(0, time + duration * 0.9);
                            osc.connect(envGain);
                            envGain.connect(gain);
                            osc.start(time);
                            osc.stop(time + duration);
                        }
                        time += duration;
                    });
                    return time;
                };
                
                const loopBGM = () => {
                    if (!this.enabled) return;
                    
                    const now = this.audioContext.currentTime;
                    playSequence(melody, this.bgmGain, now);
                    playSequence(bass, this.bgmGain, now);
                    
                    this.bgmTimeout = setTimeout(loopBGM, 2700);
                };
                
                loopBGM();
            }
            
            stopBGM() {
                if (this.bgmTimeout) {
                    clearTimeout(this.bgmTimeout);
                    this.bgmTimeout = null;
                }
            }
            
            toggle() {
                this.enabled = !this.enabled;
                if (!this.enabled) {
                    this.stopBGM();
                }
                return this.enabled;
            }
        }
        
        const soundManager = new SoundManager();
        
        function toggleSound() {
            soundManager.init();
            const enabled = soundManager.toggle();
            document.getElementById('soundToggle').textContent = enabled ? '🔊' : '🔇';
            if (enabled && gameState.running) {
                soundManager.startBGM();
            }
        }
        
        // ========== 游戏常量 ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 关卡数据
        const levels = [
            {
                name: '冲',
                desc: '用流动冷水冲15-30分钟',
                knowledge: '冲：用流动的冷水持续冲洗烫伤部位15-30分钟，可以迅速降低皮肤温度，减少热量对组织的进一步损伤。',
                theme: {
                    bgGradient: ['#87CEEB', '#E0F7FA'],
                    groundColor: '#228B22',
                    groundPattern: 'grass',
                    effect: 'water_rain',
                    obstacles: ['hot_pot', 'fire'],
                    collectible: 'water_drop',
                    collectCount: 5
                }
            },
            {
                name: '脱',
                desc: '脱去紧身衣物，勿撕扯',
                knowledge: '脱：轻轻脱下烫伤部位的衣物，如衣物与皮肤粘连，不要强行撕扯，可用剪刀剪开衣物。',
                theme: {
                    bgGradient: ['#FFE4B5', '#FFDAB9'],
                    groundColor: '#DEB887',
                    groundPattern: 'floor',
                    effect: 'flying_clothes',
                    obstacles: ['steam', 'fire'],
                    collectible: 'scissors',
                    collectCount: 5
                }
            },
            {
                name: '泡',
                desc: '浸泡在冷水中缓解疼痛',
                knowledge: '泡：将烫伤部位浸泡在冷水中10-30分钟，可以进一步降温并缓解疼痛。注意水温不要太低。',
                theme: {
                    bgGradient: ['#ADD8E6', '#B0E0E6'],
                    groundColor: '#4169E1',
                    groundPattern: 'water_pool',
                    effect: 'bubbles',

                    collectCount: 5
                }
            },
            {
                name: '盖',
                desc: '用干净纱布覆盖伤口',
                knowledge: '盖：用干净的纱布或无菌敷料轻轻覆盖烫伤部位，保护伤口不被污染。切勿使用有绒毛的布料。',
                theme: {
                    bgGradient: ['#E6E6FA', '#DDA0DD'],
                    groundColor: '#9370DB',
                    groundPattern: 'medical',
                    effect: 'falling_bandage',
                    obstacles: ['dust', 'germ'],
                    collectible: 'bandage',
                    collectCount: 5
                }
            },
            {
                name: '送',
                desc: '及时送医就诊',
                knowledge: '送：尽快将伤者送往医院接受专业治疗。尤其是面积较大、深度较深的烫伤，必须及时就医！',
                theme: {

        // 游戏状态
        let gameState = {
            running: false,
            currentLevel: 0,
            score: 0,
            lives: 3,
            player: null,
            obstacles: [],
            collectibles: [],
            platforms: [],
            particles: [],
            effects: [],
            time: 0,
            collectedThisLevel: 0  // 当前关卡收集数量
        };
        
        // ========== 玩家类 ==========
        class Player {
            constructor() {
                this.x = 50;
                this.y = 350;
                this.width = 45;
                this.height = 55;
                this.vx = 0;
                this.vy = 0;
                this.speed = 5;
                this.jumpForce = -14;
                this.gravity = 0.7;
                this.grounded = false;
                this.direction = 1;
                this.animFrame = 0;
                this.state = 'idle';
                this.hurtTimer = 0;
                this.invincibleTimer = 0;
            }
            
            update() {
                if (this.hurtTimer > 0) this.hurtTimer--;
                if (this.invincibleTimer > 0) this.invincibleTimer--;
                
                this.vy += this.gravity;
                this.y += this.vy;
                
                if (this.y + this.height > canvas.height - 60) {
                    this.y = canvas.height - 60 - this.height;
                    this.vy = 0;
                    this.grounded = true;
                }
                
                gameState.platforms.forEach(platform => {
                    if (this.vy > 0 && 
                        this.x + this.width > platform.x && 
                        this.x < platform.x + platform.width &&
                        this.y + this.height > platform.y &&
                        this.y + this.height < platform.y + platform.height + 15) {
                        this.y = platform.y - this.height;
                        this.vy = 0;
                        this.grounded = true;
                    }
                });
                
                this.x += this.vx;
                
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;
                
                if (this.vx !== 0) {
                    this.animFrame = (this.animFrame + 0.2) % 4;
                    this.state = 'run';
                } else {
                    this.state = 'idle';
                    this.animFrame = 0;
                }
                
                if (!this.grounded) this.state = 'jump';
                if (this.hurtTimer > 0) this.state = 'hurt';
                
                if (this.vx > 0) this.direction = 1;
                if (this.vx < 0) this.direction = -1;
            }
            
            draw() {
                ctx.save();
                
                // 无敌闪烁
                if (this.invincibleTimer > 0 && Math.floor(this.invincibleTimer / 5) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }
                if (this.hurtTimer > 0 && Math.floor(this.hurtTimer / 5) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }
                
                const cx = this.x + this.width / 2;
                
                // 身体 - 医疗工作服
                ctx.fillStyle = '#3498db';
                ctx.beginPath();
                ctx.roundRect(this.x + 8, this.y + 18, this.width - 16, this.height - 25, 5);
                ctx.fill();
                
                // 衣服上的红十字
                ctx.fillStyle = '#fff';
                ctx.fillRect(cx - 6, this.y + 25, 12, 4);
                ctx.fillRect(cx - 3, this.y + 22, 6, 10);
                
                // 头
                ctx.fillStyle = '#FDBF60';
                ctx.beginPath();
                ctx.arc(cx, this.y + 14, 14, 0, Math.PI * 2);
                ctx.fill();
                
                // 头发
                ctx.fillStyle = '#5D4E37';
                ctx.beginPath();
                ctx.arc(cx, this.y + 8, 14, Math.PI, Math.PI * 2);
                ctx.fill();
                
                // 表情
                ctx.fillStyle = '#000';
                const eyeOffset = this.direction > 0 ? 2 : -2;
                
                if (this.state === 'hurt') {
                    ctx.beginPath();
                    ctx.arc(cx - 5, this.y + 12, 2, 0, Math.PI * 2);
                    ctx.arc(cx + 5, this.y + 12, 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(cx, this.y + 20, 4, 0, Math.PI);
                    ctx.stroke();
                } else {
                    ctx.beginPath();
                    ctx.arc(cx - 5 + eyeOffset, this.y + 12, 2.5, 0, Math.PI * 2);
                    ctx.arc(cx + 5 + eyeOffset, this.y + 12, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(cx, this.y + 16, 5, 0.1 * Math.PI, 0.9 * Math.PI);
                    ctx.stroke();
                }
                
                // 腿
                ctx.fillStyle = '#2c3e50';
                const legOffset = Math.sin(this.animFrame * Math.PI) * 5;
                if (this.state === 'run') {
                    ctx.fillRect(this.x + 12, this.y + this.height - 12 + legOffset, 8, 12);
                    ctx.fillRect(this.x + 25, this.y + this.height - 12 - legOffset, 8, 12);
                } else {
                    ctx.fillRect(this.x + 12, this.y + this.height - 12, 8, 12);
                    ctx.fillRect(this.x + 25, this.y + this.height - 12, 8, 12);
                }
                
                ctx.restore();
            }
            
            jump() {
                if (this.grounded) {
                    this.vy = this.jumpForce;
                    this.grounded = false;
                    soundManager.playJump();
                }
            }
            
            hurt() {
                if (this.invincibleTimer > 0) return false;
                this.hurtTimer = 30;
                this.invincibleTimer = 90;
                return true;
            }
        }
        
        // ========== 障碍物类 ==========
        class Obstacle {
            constructor(type, x, y) {
                this.type = type;
                this.x = x;
                this.y = y;
                this.width = 50;
                this.height = 50;
                this.animFrame = 0;
                this.animPhase = Math.random() * Math.PI * 2;
            }
            
            update() {
                this.animFrame += 0.1;
                this.animPhase += 0.05;
            }
            
            draw() {
                ctx.save();
                switch(this.type) {
                    case 'hot_pot': this.drawHotPot(); break;
                    case 'fire': this.drawFire(); break;
                    case 'steam': this.drawSteam(); break;
                    case 'bubble_cluster': this.drawBubbleCluster(); break;
                    case 'ripple': this.drawRipple(); break;
                    case 'dust': this.drawDust(); break;
                    case 'germ': this.drawGerm(); break;
                    case 'clock_urgent': this.drawClock(); break;
                    case 'obstacle': this.drawObstacle(); break;
                }
                ctx.restore();
            }
            
            drawHotPot() {
                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(this.x, this.y + 20, 50, 30);
                ctx.fillStyle = '#c0392b';
                ctx.fillRect(this.x + 5, this.y + 25, 40, 20);
                ctx.fillStyle = '#7f8c8d';
                ctx.fillRect(this.x - 10, this.y + 30, 12, 8);
                ctx.fillRect(this.x + 48, this.y + 30, 12, 8);
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                for (let i = 0; i < 3; i++) {
                    const offset = Math.sin(this.animFrame + i) * 5;
                    ctx.beginPath();
                    ctx.arc(this.x + 15 + i * 12, this.y + 10 + offset, 6, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.fillStyle = '#f1c40f';
                ctx.font = 'bold 16px Arial';
                ctx.fillText('!', this.x + 22, this.y + 18);
            }
            
            drawFire() {
                const flicker = Math.sin(this.animFrame * 2) * 3;
                ctx.fillStyle = '#ff6b35';
                ctx.beginPath();
                ctx.moveTo(this.x + 25, this.y);
                ctx.quadraticCurveTo(this.x + 50 + flicker, this.y + 25, this.x + 25, this.y + 50);
                ctx.quadraticCurveTo(this.x - flicker, this.y + 25, this.x + 25, this.y);
                ctx.fill();
                ctx.fillStyle = '#f39c12';
                ctx.beginPath();
                ctx.moveTo(this.x + 25, this.y + 10);
                ctx.quadraticCurveTo(this.x + 40, this.y + 28, this.x + 25, this.y + 45);
                ctx.quadraticCurveTo(this.x + 10, this.y + 28, this.x + 25, this.y + 10);
                ctx.fill();
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath();
                ctx.moveTo(this.x + 25, this.y + 20);
                ctx.quadraticCurveTo(this.x + 35, this.y + 30, this.x + 25, this.y + 40);
                ctx.quadraticCurveTo(this.x + 15, this.y + 30, this.x + 25, this.y + 20);
                ctx.fill();
            }
            
            drawSteam() {
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                for (let i = 0; i < 5; i++) {
                    const yOffset = (this.animFrame * 10 + i * 20) % 60;
                    ctx.beginPath();
                    ctx.arc(this.x + 10 + i * 8, this.y + 50 - yOffset, 8 + i * 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            drawBubbleCluster() {
                const positions = [[0, 0], [15, -10], [30, 5], [8, 15], [25, -5]];
                positions.forEach((pos, i) => {
                    const bounce = Math.sin(this.animPhase + i) * 3;
                    ctx.strokeStyle = `rgba(0, 206, 209, ${0.8 - i * 0.1})`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(this.x + pos[0] + 10, this.y + pos[1] + 25 + bounce, 10 + i * 2, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.beginPath();
                    ctx.arc(this.x + pos[0] + 6, this.y + pos[1] + 20 + bounce, 3, 0, Math.PI * 2);
                    ctx.fill();
                });
            }
            
            drawRipple() {
                ctx.strokeStyle = 'rgba(65, 105, 225, 0.6)';
                ctx.lineWidth = 2;
                for (let i = 0; i < 3; i++) {
                    const scale = 1 + Math.sin(this.animFrame + i * 0.5) * 0.3;
                    ctx.beginPath();
                    ctx.ellipse(this.x + 25, this.y + 25, 20 * scale, 10 * scale, 0, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
            
            drawDust() {
                ctx.fillStyle = '#95a5a6';
                for (let i = 0; i < 6; i++) {
                    const xOff = Math.sin(this.animFrame * 0.5 + i * 1.2) * 10;
                    const yOff = Math.cos(this.animFrame * 0.3 + i) * 8;
                    ctx.beginPath();
                    ctx.arc(this.x + 10 + i * 7 + xOff, this.y + 15 + yOff, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            drawGerm() {
                ctx.fillStyle = '#27ae60';
                const wiggle = Math.sin(this.animFrame) * 3;
                ctx.beginPath();
                ctx.arc(this.x + 25, this.y + 25 + wiggle, 15, 0, Math.PI * 2);
                ctx.fill();
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2;
                    ctx.beginPath();
                    ctx.moveTo(this.x + 25 + Math.cos(angle) * 12, this.y + 25 + wiggle + Math.sin(angle) * 12);
                    ctx.lineTo(this.x + 25 + Math.cos(angle) * 20, this.y + 25 + wiggle + Math.sin(angle) * 18);
                    ctx.strokeStyle = '#27ae60';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.x + 20, this.y + 22 + wiggle, 4, 0, Math.PI * 2);
                ctx.arc(this.x + 30, this.y + 22 + wiggle, 4, 0, Math.PI * 2);
                ctx.fill();
            }
            
            drawClock() {
                const pulse = 1 + Math.sin(this.animFrame * 3) * 0.1;
                ctx.save();
                ctx.translate(this.x + 25, this.y + 25);
                ctx.scale(pulse, pulse);
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath();
                ctx.arc(0, 0, 22, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(0, 0, 18, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#e74c3c';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(0, -12);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(10, 5);
                ctx.stroke();
                ctx.restore();
                if (Math.floor(this.animFrame) % 2 === 0) {
                    ctx.fillStyle = 'rgba(231, 76, 60, 0.3)';
                    ctx.beginPath();
                    ctx.arc(this.x + 25, this.y + 25, 30, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            drawObstacle() {
                // 石头障碍
                ctx.fillStyle = '#7f8c8d';
                ctx.beginPath();
                ctx.moveTo(this.x + 25, this.y);
                ctx.lineTo(this.x + 50, this.y + 20);
                ctx.lineTo(this.x + 45, this.y + 50);
                ctx.lineTo(this.x + 5, this.y + 50);
                ctx.lineTo(this.x, this.y + 20);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#95a5a6';
                ctx.beginPath();
                ctx.moveTo(this.x + 25, this.y + 5);
                ctx.lineTo(this.x + 40, this.y + 20);
                ctx.lineTo(this.x + 35, this.y + 40);
                ctx.lineTo(this.x + 15, this.y + 40);
                ctx.lineTo(this.x + 10, this.y + 20);
                ctx.closePath();
                ctx.fill();
            }
        }
        
        // ========== 收集品类 ==========
        class Collectible {
            constructor(type, x, y, index) {
                this.type = type;
                this.x = x;
                this.y = y;
                this.baseY = y;
                this.width = 35;
                this.height = 35;
                this.collected = false;
                this.index = index;
                this.floatPhase = Math.random() * Math.PI * 2;
                this.glowPhase = 0;
                this.collectAnim = 0;
            }
            
            update() {
                if (this.collected) {
                    this.collectAnim += 0.2;
                    return;
                }
                this.floatPhase += 0.08;
                this.glowPhase += 0.1;
                this.y = this.baseY + Math.sin(this.floatPhase) * 8;
            }
            
            draw() {
                if (this.collected && this.collectAnim > 1) return;
                
                ctx.save();
                
                if (this.collected) {
                    // 收集动画
                    ctx.globalAlpha = 1 - this.collectAnim;
                    ctx.translate(this.x + 17, this.y + 17);
                    ctx.scale(1 + this.collectAnim, 1 + this.collectAnim);
                    ctx.translate(-17, -17);
                }
                
                const glow = Math.sin(this.glowPhase) * 0.2 + 0.8;
                ctx.shadowColor = '#f1c40f';
                ctx.shadowBlur = 15 * glow;
                
                switch(this.type) {
                    case 'water_drop': this.drawWaterDrop(); break;
                    case 'scissors': this.drawScissors(); break;
                    case 'bucket': this.drawBucket(); break;
                    case 'bandage': this.drawBandage(); break;
                    case 'ambulance': this.drawAmbulance(); break;
                }
                
                ctx.restore();
                
                // 绘制序号
                if (!this.collected) {
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 12px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(this.index + 1, this.x + 17, this.y - 5);
                }
            }
            
            drawWaterDrop() {
                ctx.fillStyle = '#3498db';
                ctx.beginPath();
                ctx.moveTo(this.x + 17, this.y);
                ctx.quadraticCurveTo(this.x + 35, this.y + 17, this.x + 17, this.y + 35);
                ctx.quadraticCurveTo(this.x - 1, this.y + 17, this.x + 17, this.y);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.beginPath();
                ctx.ellipse(this.x + 10, this.y + 15, 4, 6, -0.3, 0, Math.PI * 2);
                ctx.fill();
            }
            
            drawScissors() {
                ctx.strokeStyle = '#7f8c8d';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(this.x + 8, this.y + 25, 10, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(this.x + 27, this.y + 25, 10, 0, Math.PI * 2);
                ctx.stroke();
                ctx.strokeStyle = '#ecf0f1';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(this.x + 8, this.y + 25);
                ctx.lineTo(this.x + 30, this.y + 10);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(this.x + 27, this.y + 25);
                ctx.lineTo(this.x + 5, this.y + 10);
                ctx.stroke();
                ctx.fillStyle = '#95a5a6';
                ctx.beginPath();
                ctx.arc(this.x + 17, this.y + 18, 4, 0, Math.PI * 2);
                ctx.fill();
            }
            
            drawBucket() {
                ctx.fillStyle = '#3498db';
                ctx.beginPath();
                ctx.moveTo(this.x + 5, this.y + 8);
                ctx.lineTo(this.x + 2, this.y + 32);
                ctx.lineTo(this.x + 33, this.y + 32);
                ctx.lineTo(this.x + 30, this.y + 8);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#2980b9';
                ctx.fillRect(this.x, this.y + 5, 35, 6);
                ctx.fillStyle = 'rgba(52, 152, 219, 0.7)';
                ctx.fillRect(this.x + 4, this.y + 12, 27, 15);
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.ellipse(this.x + 17, this.y + 18, 10, 3, 0, 0, Math.PI);
                ctx.stroke();
                ctx.strokeStyle = '#7f8c8d';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(this.x + 17, this.y + 5, 15, Math.PI + 0.3, -0.3);
                ctx.stroke();
            }
            
            drawBandage() {
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.ellipse(this.x + 17, this.y + 17, 15, 17, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(this.x + 13, this.y + 10, 8, 14);
                ctx.fillRect(this.x + 8, this.y + 14, 18, 6);
                ctx.strokeStyle = '#bdc3c7';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.ellipse(this.x + 17, this.y + 17, 15, 17, 0, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            drawAmbulance() {
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.x + 2, this.y + 12, 30, 18);
                ctx.fillStyle = '#ecf0f1';
                ctx.fillRect(this.x + 8, this.y + 6, 18, 8);
                ctx.fillStyle = '#85c1e9';
                ctx.fillRect(this.x + 5, this.y + 15, 8, 8);
                ctx.fillRect(this.x + 21, this.y + 15, 8, 8);
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(this.x + 13, this.y + 14, 8, 3);
                ctx.fillRect(this.x + 15, this.y + 12, 4, 7);
                ctx.fillStyle = '#2c3e50';
                ctx.beginPath();
                ctx.arc(this.x + 8, this.y + 30, 5, 0, Math.PI * 2);
                ctx.arc(this.x + 26, this.y + 30, 5, 0, Math.PI * 2);
                ctx.fill();
                if (Math.floor(this.glowPhase) % 2 === 0) {
                    ctx.fillStyle = '#e74c3c';
                } else {
                    ctx.fillStyle = '#3498db';
                }
                ctx.beginPath();
                ctx.arc(this.x + 13, this.y + 4, 3, 0, Math.PI * 2);
                ctx.arc(this.x + 21, this.y + 4, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // ========== 场景特效 ==========
        class SceneEffect {
            constructor(type, x, y) {
                this.type = type;
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.life = 100;
                this.maxLife = 100;
                this.phase = Math.random() * Math.PI * 2;
            }
            
            update() {
                this.phase += 0.1;
                this.life--;
                
                switch(this.type) {
                    case 'water_rain':
                        this.y += 8;
                        if (this.y > canvas.height) {
                            this.y = -20;
                            this.x = Math.random() * canvas.width;
                        }
                        break;
                    case 'flying_clothes':
                        this.y += 1;
                        this.x += Math.sin(this.phase) * 2;
                        if (this.y > canvas.height - 80) this.life = 0;
                        break;
                    case 'falling_bandage':
                        this.y += 2;
                        this.x += Math.sin(this.phase * 0.5) * 1;
                        if (this.y > canvas.height - 80) this.life = 0;
                        break;
                    case 'bubbles':
                        this.y -= 1;
                        this.x += Math.sin(this.phase) * 0.5;
                        if (this.y < -20) {
                            this.y = canvas.height + 20;
                            this.x = Math.random() * canvas.width;
                        }
                        break;
                }
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = Math.min(1, this.life / this.maxLife);
                
                switch(this.type) {
                    case 'water_rain':
                        ctx.strokeStyle = '#3498db';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(this.x, this.y);
                        ctx.lineTo(this.x - 3, this.y + 15);
                        ctx.stroke();
                        break;
                    case 'flying_clothes':
                        ctx.fillStyle = '#e74c3c';
                        ctx.save();
                        ctx.translate(this.x, this.y);
                        ctx.rotate(Math.sin(this.phase) * 0.3);
                        ctx.fillRect(-15, -10, 30, 20);
                        ctx.fillStyle = '#c0392b';
                        ctx.fillRect(-15, 10, 30, 5);
                        ctx.restore();
                        break;
                    case 'falling_bandage':
                        ctx.fillStyle = '#fff';
                        ctx.save();
                        ctx.translate(this.x, this.y);
                        ctx.rotate(Math.sin(this.phase) * 0.2);
                        ctx.fillRect(-12, -8, 24, 16);
                        ctx.fillStyle = '#e74c3c';
                        ctx.fillRect(-4, -6, 8, 12);
                        ctx.restore();
                        break;
                    case 'bubbles':
                        ctx.strokeStyle = 'rgba(0, 206, 209, 0.6)';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, 8 + Math.sin(this.phase) * 2, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.fillStyle = 'rgba(255,255,255,0.3)';
                        ctx.beginPath();
                        ctx.arc(this.x - 3, this.y - 3, 2, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                    case 'ambulance_light':
                        const flash = Math.sin(this.phase * 3) > 0;
                        if (flash) {
                            ctx.fillStyle = 'rgba(231, 76, 60, 0.3)';
                            ctx.beginPath();
                            ctx.arc(canvas.width - 50, 50, 40, 0, Math.PI * 2);
                            ctx.fill();
                        }
                        break;
                }
                
                ctx.restore();
            }
        }
        
        // ========== 粒子效果 ==========
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8 - 3;
                this.life = 40;
                this.maxLife = 40;
                this.color = color;
                this.size = Math.random() * 6 + 3;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2;
                this.life--;
            }
            
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life / this.maxLife;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        // ========== 初始化关卡 ==========
        function initLevel(levelIndex) {
            const level = levels[levelIndex];
            gameState.collectedThisLevel = 0;
            
            // 创建平台
            gameState.platforms = [
                { x: 0, y: canvas.height - 60, width: canvas.width, height: 60 },
                { x: 100, y: 340, width: 120, height: 20 },
                { x: 300, y: 280, width: 100, height: 20 },
                { x: 500, y: 320, width: 120, height: 20 },
                { x: 200, y: 200, width: 100, height: 20 },
                { x: 450, y: 180, width: 100, height: 20 },
                { x: 620, y: 250, width: 80, height: 20 }
            ];
            
            // 创建障碍物
            gameState.obstacles = [];
            const obstacleTypes = level.theme.obstacles;
            for (let i = 0; i < 4; i++) {
                const type = obstacleTypes[i % obstacleTypes.length];
                gameState.obstacles.push(new Obstacle(type, 150 + i * 180, canvas.height - 110));
            }
            
            // 创建收集物 (5个)
            gameState.collectibles = [];
            const collectPositions = [
                { x: 140, y: 290 },
                { x: 330, y: 230 },
                { x: 530, y: 270 },
                { x: 230, y: 150 },
                { x: 480, y: 130 }
            ];
            for (let i = 0; i < level.theme.collectCount; i++) {
                const pos = collectPositions[i];
                gameState.collectibles.push(new Collectible(level.theme.collectible, pos.x, pos.y, i + 1));
            }
            
            // 创建场景特效
            gameState.effects = [];
            const effectType = level.theme.effect;
            for (let i = 0; i < 30; i++) {
                gameState.effects.push(new SceneEffect(effectType, Math.random() * canvas.width, Math.random() * canvas.height));
            }
            
            // 更新UI
            document.getElementById('stepName').textContent = `第${levelIndex + 1}步：${level.name}`;
            document.getElementById('stepDesc').textContent = `收集全部${level.theme.collectCount}个物品！(${gameState.collectedThisLevel}/${level.theme.collectCount})`;
            document.getElementById('levelIndicator').textContent = `关卡 ${levelIndex + 1}/5`;
        }
        
        // ========== 碰撞检测 ==========
        function checkCollision(a, b) {
            return a.x < b.x + b.width &&
                   a.x + a.width > b.x &&
                   a.y < b.y + b.height &&
                   a.y + a.height > b.y;
        }
        
        // ========== 绘制背景 ==========
        function drawBackground() {
            const level = levels[gameState.currentLevel];
            const theme = level.theme;
            
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, theme.bgGradient[0]);
            gradient.addColorStop(1, theme.bgGradient[1]);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            gameState.effects.forEach(effect => {
                effect.update();
                effect.draw();
            });
            
            switch(theme.groundPattern) {
                case 'grass': drawGrassScene(); break;
                case 'floor': drawFloorScene(); break;
                case 'water_pool': drawWaterPoolScene(); break;
                case 'medical': drawMedicalScene(); break;
                case 'road': drawRoadScene(); break;
            }
        }
        
        function drawGrassScene() {
            ctx.fillStyle = '#27ae60';
            ctx.fillRect(0, canvas.height - 60, canvas.width, 60);
            for (let i = 0; i < canvas.width; i += 15) {
                ctx.fillStyle = '#2ecc71';
                ctx.beginPath();
                ctx.moveTo(i, canvas.height - 60);
                ctx.lineTo(i + 7, canvas.height - 75);
                ctx.lineTo(i + 15, canvas.height - 60);
                ctx.fill();
            }
            // 淋雨装置
            ctx.fillStyle = '#7f8c8d';
            ctx.fillRect(50, 0, 20, 40);
            ctx.fillRect(200, 0, 20, 40);
            ctx.fillRect(400, 0, 20, 40);
            ctx.fillRect(600, 0, 20, 40);
            ctx.fillStyle = '#3498db';
            ctx.fillRect(55, 35, 10, 8);
            ctx.fillRect(205, 35, 10, 8);
            ctx.fillRect(405, 35, 10, 8);
            ctx.fillRect(605, 35, 10, 8);
        }
        
        function drawFloorScene() {
            ctx.fillStyle = '#DEB887';
            ctx.fillRect(0, canvas.height - 60, canvas.width, 60);
            ctx.strokeStyle = '#D2691E';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 80) {
                ctx.beginPath();
                ctx.moveTo(i, canvas.height - 60);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            ctx.fillStyle = 'rgba(231, 76, 60, 0.3)';
            ctx.fillRect(100, canvas.height - 80, 40, 25);
            ctx.fillStyle = 'rgba(52, 152, 219, 0.3)';
            ctx.fillRect(300, canvas.height - 75, 35, 20);
            ctx.fillStyle = 'rgba(155, 89, 182, 0.3)';
            ctx.fillRect(550, canvas.height - 78, 45, 22);
        }
        
        function drawWaterPoolScene() {
            ctx.fillStyle = '#4169E1';
            ctx.fillRect(0, canvas.height - 60, canvas.width, 60);
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 2;
            for (let i = 0; i < 5; i++) {
                const x = (gameState.time * 2 + i * 200) % (canvas.width + 200) - 100;
                ctx.beginPath();
                ctx.moveTo(x, canvas.height - 30);
                ctx.quadraticCurveTo(x + 50, canvas.height - 40, x + 100, canvas.height - 30);
                ctx.stroke();
            }
            ctx.fillStyle = 'rgba(135, 206, 250, 0.5)';
            for (let i = 0; i < 8; i++) {
                const x = (i * 120 + gameState.time * 0.5) % canvas.width;
                const y = canvas.height - 40 + Math.sin(gameState.time * 0.1 + i) * 5;
                ctx.beginPath();
                ctx.arc(x, y, 15, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function drawMedicalScene() {
            ctx.fillStyle = '#ecf0f1';
            ctx.fillRect(0, canvas.height - 60, canvas.width, 60);
            ctx.fillStyle = '#e74c3c';
            for (let i = 0; i < 4; i++) {
                const x = 100 + i * 200;
                ctx.fillRect(x - 15, canvas.height - 100, 30, 10);
                ctx.fillRect(x - 10, canvas.height - 105, 20, 20);
            }
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(150, canvas.height - 75, 12, 0, Math.PI * 2);
            ctx.arc(450, canvas.height - 72, 10, 0, Math.PI * 2);
            ctx.arc(650, canvas.height - 78, 11, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function drawRoadScene() {
            ctx.fillStyle = '#7f8c8d';
            ctx.fillRect(0, canvas.height - 60, canvas.width, 60);
            ctx.fillStyle = '#f1c40f';
            for (let i = 0; i < canvas.width; i += 80) {
                ctx.fillRect(i + 20, canvas.height - 35, 40, 6);
            }
            ctx.fillStyle = '#e74c3c';
            ctx.font = 'bold 24px Arial';
            ctx.fillText('+', canvas.width - 80, canvas.height - 30);
            ctx.fillStyle = '#fff';
            ctx.fillRect(canvas.width - 85, canvas.height - 45, 30, 30);
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(canvas.width - 82, canvas.height - 42, 24, 8);
            ctx.fillRect(canvas.width - 77, canvas.height - 47, 14, 18);
            ctx.fillStyle = Math.floor(gameState.time / 15) % 2 === 0 ? '#e74c3c' : '#fff';
            ctx.font = 'bold 16px Arial';
            ctx.fillText('快!', 20, 50);
        }
        
        // ========== 绘制平台 ==========
        function drawPlatforms() {
            gameState.platforms.forEach((platform, index) => {
                if (index > 0) {
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
                    ctx.fillStyle = '#A0522D';
                    ctx.fillRect(platform.x, platform.y, platform.width, 5);
                    ctx.fillStyle = '#e74c3c';
                    ctx.beginPath();
                    ctx.arc(platform.x + platform.width/2, platform.y, 8, Math.PI, 0);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(platform.x + platform.width/2 - 3, platform.y - 2, 2, 0, Math.PI * 2);
                    ctx.arc(platform.x + platform.width/2 + 4, platform.y - 1, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }
        
        // ========== 游戏主循环 ==========
        function gameLoop() {
            if (!gameState.running) return;
            
            gameState.time++;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBackground();
            drawPlatforms();
            
            // 更新和绘制障碍物
            gameState.obstacles.forEach(obstacle => {
                obstacle.update();
                obstacle.draw();
                
                if (checkCollision(gameState.player, obstacle)) {
                    if (gameState.player.hurt()) {
                        loseLife();
                    }
                }
            });
            
            // 更新和绘制收集物
            gameState.collectibles.forEach(collectible => {
                collectible.update();
                collectible.draw();
                
                if (!collectible.collected && checkCollision(gameState.player, collectible)) {
                    collectible.collected = true;
                    gameState.score += 150;
                    gameState.collectedThisLevel++;
                    updateScore();
                    updateCollectProgress();
                    soundManager.playCoin();
                    
                    // 粒子效果
                    for (let i = 0; i < 15; i++) {
                        gameState.particles.push(new Particle(
                            collectible.x + 17,
                            collectible.y + 17,
                            '#f1c40f'
                        ));
                    }
                    
                    // 检查是否收集完所有物品
                    checkLevelComplete();
                }
            });
            
            // 更新和绘制粒子
            gameState.particles = gameState.particles.filter(p => {
                p.update();
                p.draw();
                return p.life > 0;
            });
            
            gameState.player.update();
            gameState.player.draw();
            
            requestAnimationFrame(gameLoop);
        }
        
        // 更新收集进度
        function updateCollectProgress() {
            const level = levels[gameState.currentLevel];
            document.getElementById('stepDesc').textContent = `收集全部${level.theme.collectCount}个物品！(${gameState.collectedThisLevel}/${level.theme.collectCount})`;
        }
        
        // 检查关卡完成
        function checkLevelComplete() {
            const level = levels[gameState.currentLevel];
            if (gameState.collectedThisLevel >= level.theme.collectCount) {
                // 确保所有物品都已收集动画完成
                setTimeout(() => {
                    if (gameState.collectibles.every(c => c.collected)) {
                        nextLevel();
                    }
                }, 300);
            }
        }
        
        // ========== 失去生命 ==========
        function loseLife() {
            gameState.lives--;
            updateLives();
            soundManager.playHurt();
            
            for (let i = 0; i < 25; i++) {
                gameState.particles.push(new Particle(
                    gameState.player.x + 22,
                    gameState.player.y + 27,
                    '#e74c3c'
                ));
            }
            
            if (gameState.lives <= 0) {
                gameOver(false);
            } else {
                gameState.player.x = 50;
                gameState.player.y = 350;
                gameState.player.vy = 0;
            }
        }
        
        // ========== 更新显示 ==========
        function updateLives() {
            const hearts = document.querySelectorAll('.heart');
            hearts.forEach((heart, index) => {
                if (index >= gameState.lives) {
                    heart.classList.add('lost');
                } else {
                    heart.classList.remove('lost');
                }
            });
        }
        
        function updateScore() {
            document.getElementById('score').textContent = gameState.score;
        }
        
        // ========== 下一关 ==========
        function nextLevel() {
            soundManager.playLevelComplete();
            gameState.currentLevel++;
            
            if (gameState.currentLevel >= levels.length) {
                gameOver(true);
                return;
            }
            
            showKnowledge(levels[gameState.currentLevel - 1]);
            initLevel(gameState.currentLevel);
            
            gameState.player.x = 50;
            gameState.player.y = 350;
            gameState.player.vy = 0;
            gameState.player.invincibleTimer = 60;
        }
        
        // ========== 显示急救知识 ==========
        function showKnowledge(level) {
            document.getElementById('cardTitle').textContent = `第${gameState.currentLevel}步：${level.name}`;
            document.getElementById('cardContent').textContent = level.knowledge;
            document.getElementById('knowledgeCard').classList.add('show');
            gameState.running = false;
        }
        
        function closeCard() {
            document.getElementById('knowledgeCard').classList.remove('show');
            gameState.running = true;
            gameLoop();
        }
        
        // ========== 游戏结束 ==========
        function gameOver(won) {
            gameState.running = false;
            soundManager.stopBGM();
            
            if (won) {
                soundManager.playLevelComplete();
                setTimeout(() => soundManager.playLevelComplete(), 500);
            } else {
                soundManager.playGameOver();
            }
            
            document.getElementById('endTitle').textContent = won ? '🎉 恭喜通关！🎉' : '游戏结束';
            document.getElementById('endScore').textContent = `🏥 汉川市向日葵社工中心 · 最终得分: ${gameState.score}`;
            document.getElementById('endScreen').classList.add('show');
        }
        
        // ========== 开始游戏 ==========
        function startGame() {
            soundManager.init();
            document.getElementById('startScreen').classList.add('hidden');
            
            gameState = {
                running: true,
                currentLevel: 0,
                score: 0,
                lives: 3,
                player: new Player(),
                obstacles: [],
                collectibles: [],
                platforms: [],
                particles: [],
                effects: [],
                time: 0,
                collectedThisLevel: 0
            };
            
            updateLives();
            updateScore();
            initLevel(0);
            soundManager.startBGM();
            gameLoop();
        }
        
        // ========== 重新开始 ==========
        function restartGame() {
            document.getElementById('endScreen').classList.remove('show');
            document.querySelectorAll('.heart').forEach(heart => {
                heart.classList.remove('lost');
            });
            startGame();
        }
        
        // ========== 键盘控制 ==========
        document.addEventListener('keydown', (e) => {
            if (!gameState.running) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    gameState.player.vx = -gameState.player.speed;
                    break;
                case 'ArrowRight':
                    gameState.player.vx = gameState.player.speed;
                    break;
                case 'ArrowUp':
                case ' ':
                    gameState.player.jump();
                    e.preventDefault();
                    break;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                gameState.player.vx = 0;
            }
        });
        
        // ========== 移动端控制 ==========
        function mobileMove(dir) {
            if (!gameState.running) return;
            gameState.player.vx = dir * gameState.player.speed;
        }
        
        function mobileMoveEnd(dir) {
            if (gameState.player.vx === dir * gameState.player.speed) {
                gameState.player.vx = 0;
            }
        }
        
        function mobileJump() {
            if (!gameState.running) return;
            gameState.player.jump();
        }
    </script>
</body>
</html>
