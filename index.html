<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=burn-first-aid-game.html">
    <title>烧烫伤急救大冒险</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-size: 1.2rem;
            color: #ffeaa7;
            margin-bottom: 2rem;
        }
        .loading {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 2rem 0;
        }
        .loading span {
            width: 12px;
            height: 12px;
            background: #e74c3c;
            border-radius: 50%;
            animation: bounce 0.6s ease infinite;
        }
        .loading span:nth-child(2) { animation-delay: 0.1s; }
        .loading span:nth-child(3) { animation-delay: 0.2s; }
        .loading span:nth-child(4) { animation-delay: 0.3s; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .link {
            margin-top: 1.5rem;
        }
        .link a {
            color: #3498db;
            text-decoration: none;
            font-size: 1.1rem;
            padding: 0.8rem 2rem;
            border: 2px solid #3498db;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .link a:hover {
            background: #3498db;
            color: #fff;
        }
        .org {
            margin-top: 3rem;
            font-size: 0.9rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏥</div>
        <h1>烧烫伤急救大冒险</h1>
        <p class="subtitle">🏥 汉川市向日葵社工中心 · 烧烫伤五步急救法 🚑</p>
        
        <div class="loading">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
        
        <p style="margin-bottom: 1rem;">正在加载游戏...</p>
        
        <div class="link">
            <a href="burn-first-aid-game.html">👉 点击进入游戏</a>
        </div>
        
        <p class="org">🌻 汉川市向日葵社工中心</p>
    </div>
</body>
</html>
